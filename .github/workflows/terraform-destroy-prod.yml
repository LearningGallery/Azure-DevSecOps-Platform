name: 'Terraform Destroy InfraCode [PROD]'

# 1. NO automated triggers. This can only be run manually.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy-prod:
    name: 'Destroy [PROD]'
    runs-on: windows-latest
    
    # 2. Triggers the PROD Email Approval Gate
    environment: prod 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # Keeps PowerShell output clean
          
      - name: Terraform Init
        run: terraform init
        working-directory: .\environment\LearningGallery\Infra-IaC-Code\prod 

      - name: Run Destroy Script
        shell: pwsh
        run: .\environment\LearningGallery\Infra-IaC-Code\prod\Terraform-Scripts\Destroy-Terraform.ps1 -Action "destroy" -Environment "prod" -Path ".\environment\LearningGallery\Infra-IaC-Code\prod"
        env:
          TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_windows_admin_password: ${{ secrets.WINDOWS_ADMIN_PASSWORD }}